# knowledge-base — tool versions + tasks
#
# A mise/hk/uv project (same stack as ray-manaloto/dotfiles) whose purpose is to
# be the shared research substrate any AI/LLM agent connects to: add sources,
# query the resulting graphify knowledge graph, and every other graphify
# feature. See CLAUDE.md.
#
# graphify is PROJECT-SCOPED here (never global): the graph lives in this repo's
# graphify-out/, and the MCP server is pinned to THIS graph.json — so multiple
# graphify projects on the same host never collide.

[tools]
# Pins mirror ray-manaloto/dotfiles/.config/mise/conf.d/shared.toml (known-good).
python = "3.14.6"
uv = "0.11.28"
hk = "1.52.0"
pkl = "0.32.0"
typos = "1.48.0"
# graphify [all] resolves on host Python 3.14 (leiden/graspologic extra
# auto-skips <3.13 → Louvain clustering fallback, accepted). Table form so
# `mise upgrade --bump` can rewrite the pin in place (bracket-in-name form
# strands the pin — dotfiles 2026-07-20).
"pipx:graphifyy" = { version = "0.9.25", extras = ["all"] }
# ffmpeg: system binary graphify's `video` extra (faster-whisper) needs to
# extract audio before transcription — NOT a pip dep, so graphifyy[all] can't
# supply it. Required for `graphify add <youtube-url>`. conda backend (prebuilt).
"conda:ffmpeg" = "8.1.2"
taplo = "0.10.0"
rumdl = "v0.2.40"
gitleaks = "8.30.1"
# Cross-vendor executor-lane CLIs for the adopted Fable-5 orchestrator plugin
# (mar3co/fable-orchestrator, in `codex` mode) + the antigravity plugin
# (yuting0624/antigravity-for-claude-code). Canonical mise registry short names
# (https://mise.jdx.dev/registry.html): `codex`=aqua:openai/codex,
# `antigravity-cli`=aqua:google-antigravity/antigravity-cli (Google's current
# agentic CLI, exposes Gemini 3.x; ships both `antigravity` and the `agy`
# symlink the antigravity plugin drives). The Claude architect stays in the
# chair; these are the executor lanes only. auth is per-user (codex login /
# Google account) — mise manages the binaries, not the credentials.
codex = "0.145.0"
antigravity-cli = "1.1.5"

[settings]
experimental = true
auto_install = true
lockfile = true
# New tool requests get exact-pinned versions (pins are the versioning model).
pin = true

[settings.status]
show_tools = true
missing_tools = "always"

[hooks]
# Reshim after installs (pipx backend leaves stale shims otherwise) + install
# the hk git hooks against mise-provided binaries.
postinstall = "mise reshim && hk install --mise"

[env]
HK_MISE = "1"
# gitleaks does not auto-load .gitleaks.toml; point it there so the allowlist
# (skip the gitignored sources/ research corpus + derived graphify-out/) always
# applies — the corpus inherently contains secret-LIKE strings but is never committed.
GITLEAKS_CONFIG = "{{config_root}}/.gitleaks.toml"

# ---------------------------------------------------------------------------
# Lint / test gates (thin wrappers; logic lives in hk.pkl and python/)
# ---------------------------------------------------------------------------
[tasks.lint]
description = "Run hk check --all (read-only, ≡ CI) — hygiene, typos, pkl"
run = "hk run check --all"

[tasks.fmt]
description = "Auto-fix formatting/lint issues"
run = "hk fix"

[tasks.test]
description = "Run the Python test suite"
run = "uv run pytest tests/ -x -q"

[tasks.check]
description = "Full quality check (lint + test)"
depends = ["lint", "test"]

# ---------------------------------------------------------------------------
# Knowledge-base tasks — the reason this repo exists
# ---------------------------------------------------------------------------
[tasks.kb-build]
description = "Reproduce graph.json from committed inputs (manifests + doc extractions) — deterministic, no LLM"
# Clones each sources/*.manifest at its pinned SHA (gitignored), AST-extracts code
# (free), then replays the committed sources/extractions/*.json doc chunks. No
# host-agent needed — reproduction is free. Logic in kb_setup.graph.
run = "uv run kb-setup build"

[tasks.kb-update]
description = "Advance a source to latest upstream + incrementally re-extract: mise run kb-update -- <name>"
# Bumps the manifest SHA to upstream HEAD, re-clones, `graphify update` (incremental
# AST, free). Changed DOCS still need a host-agent pass in a Claude session.
run = "uv run kb-setup update"

[tasks.kb-query]
description = 'Query the graph: mise run kb-query -- "<question>" [--budget N]'
# Deterministic BFS/DFS over graphify-out/graph.json — no LLM, source-cited.
run = "graphify query"

[tasks.kb-serve]
description = "Start the read-only MCP server pinned to THIS graph (stdio)"
# graphify-mcp binds to an ABSOLUTE graph path, so this server only ever serves
# this repo's graph — no collision with other graphify projects. HTTP transport:
# add `-- --transport http --port 8080`.
run = "graphify-mcp {{config_root}}/graphify-out/graph.json"

[tasks.kb-add]
description = 'Add a URL source then rebuild: mise run kb-add -- <url> [--author NAME]'
# Fetches the URL into sources/ and updates the graph. Repo ingestion uses the
# graphify clone + kb-build flow instead (see CLAUDE.md). GEMINI/GOOGLE keys are
# blanked so graphify's backend auto-detect can NEVER pick a non-Claude backend
# (Claude-Code-only mandate); the no-key fetch path uses no LLM anyway.
env = { GEMINI_API_KEY = "", GOOGLE_API_KEY = "" }
run = "graphify add"

[tasks.kb-merge]
description = 'Merge one host-agent extraction chunk into the graph: mise run kb-merge -- <chunk.json> [source_root]'
# Wraps _merge_docs.py under graphify's interpreter (Gemini-free env). No LLM —
# build_merge + Louvain re-cluster only. Logic in kb_setup.graphify_ops.
run = "uv run kb-setup merge"

[tasks.kb-label]
description = "(Re)label communities (deterministic, no-LLM, Gemini-free): mise run kb-label [-- --missing-only | --claude-cli]"
# Default = graphify's deterministic hub labeler (no API, no Gemini). GEMINI/GOOGLE
# keys are stripped in kb_setup.graphify_ops.clean_env so Gemini can never be
# auto-selected. `--claude-cli` opts into the claude-cli backend, which is BROKEN
# for labeling (#2076: prose-wrapped JSON graphify can't parse) and falls back to
# deterministic — kept only to re-probe a future graphify fix. Logic in graphify_ops.
run = "uv run kb-setup label"

[tasks.kb-transcribe]
description = "Transcribe a local audio file with graphify's bundled whisper (local, no API): mise run kb-transcribe -- <audio>"
# For a graphify-downloaded yt_*.m4a. Local faster-whisper — no LLM backend. The
# transcript is then host-agent (Claude Code) extracted like any prose source.
run = "uv run kb-setup transcribe"

[tasks.kb-artifacts]
description = 'Regenerate all derived outputs (wiki/graphml/cypher/html/tree/obsidian/svg): mise run kb-artifacts [-- fmt...]'
# Data-driven registry in kb_setup.artifacts (no copy-paste); ensures output deps
# (scipy for svg) first. All read graph.json; none are committed (regenerable).
run = "uv run kb-setup artifacts"

[tasks.kb-ensure-deps]
description = "Inject output-only runtime deps missing from graphify's env (e.g. scipy for svg on py3.14)"
run = "uv run kb-setup ensure-deps"

# --- self-learning loop (work memory) — record outcomes, aggregate lessons ---
[tasks.kb-remember]
description = 'Record a Q&A outcome to work memory: mise run kb-remember -- --question "Q" --answer "A" --nodes N1 N2 --outcome useful|dead_end|corrected'
# Appends to graphify-out/memory/ (git-tracked — authored knowledge). The
# kb-curator skill runs this on every ingestion so the corpus self-improves.
run = "graphify save-result"

[tasks.kb-reflect]
description = "Aggregate work-memory outcomes into reflections/LESSONS.md + the .graphify_learning.json overlay (deterministic, no LLM)"
# --graph groups lessons by community + tags nodes preferred/tentative/contested.
# reflections/ + overlay are gitignored (regenerable); run each session.
run = "graphify reflect --graph {{config_root}}/graphify-out/graph.json"

# --- tool currency (the shared engine; see currency.toml + kb_setup.currency) ---
[tasks.kb-currency-check]
description = "Offline drift check: is the installed tooling in sync with the pins? (step 1)"
# Subprocess-free and ~10ms, which is what lets the SessionStart hook run it every
# session. Prints NOTHING when clean, and always exits 0 — a session must never be
# blocked over a version pin. Logic in kb_setup.currency.sync.
run = "uv run kb-setup currency check"

[tasks.kb-currency]
description = 'Full tool-currency workflow (steps 1-4 + 6): mise run kb-currency [-- --tool T --json]'
# Fetches upstream + release notes + tracked-issue movement, applies the six-gate
# bar, and writes the committed report under docs/currency/. Step 5 (the
# AskUserQuestion interview) belongs to the tool-currency skill: only the model can
# ask, so it can never live in a hook or a task. Logic in kb_setup.currency.run.
run = "uv run kb-setup currency run"

# --- reusable ingestion seams (replace hand-rolled one-offs; logic in kb_setup) ---
[tasks.kb-ship]
description = 'Gate (lint+test) → push → open PR for the current branch: mise run kb-ship [-- --title T]'
# The ONLY sanctioned way to open a PR here — `gh pr create` is guard-denied.
# Gates run BEFORE the push, so a red branch never becomes a PR. This repo has no
# CI, so the local gates are the only gates. Logic in kb_setup.pr.
run = "uv run kb-setup ship"

[tasks.kb-land]
description = 'Verify checks → SHA-pinned squash-merge → sync main: mise run kb-land -- <PR#>'
# Pins the merge to the head SHA it just verified (`gh pr merge --match-head-commit`),
# so a commit pushed between check and merge cannot ride in unverified. No main-CI
# watch and no container re-validation — this repo has neither. Logic in kb_setup.pr.
run = "uv run kb-setup land"

[tasks.kb-manifest-add]
description = 'Pin a new repo source: mise run kb-manifest-add -- <url> [--ref R --kind K --name N --comment C --force]'
# Resolves upstream HEAD via git ls-remote (no clone) + writes sources/<name>.manifest.
# The reusable replacement for hand-writing a manifest. Logic in kb_setup.manifest.add.
run = "uv run kb-setup manifest-add"

[tasks.kb-assemble]
description = 'Validate + combine host-agent extraction chunks: mise run kb-assemble -- <name> <chunk.json>...'
# Union-merges per-source chunks (the kb-extract Workflow fan-out output) into one
# committed sources/extractions/<name>-docs.json, failing loud on any schema/dangling/
# id-collision problem. Logic in kb_setup.chunks.assemble.
run = "uv run kb-setup assemble"

[tasks.kb-validate-chunks]
description = 'Schema-check extraction chunks (unique ids, no dangling edges): mise run kb-validate-chunks -- <chunk.json>...'
# Standalone gate over sources/extractions/*.json (or scratch chunks). Logic in kb_setup.chunks.
run = "uv run kb-setup validate-chunks"
